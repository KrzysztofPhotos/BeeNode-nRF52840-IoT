# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_GATT_SERVICE_CHANGED=y
CONFIG_BT_HCI=y
CONFIG_BT_CTLR=y
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# --- System ---
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_LOG=n

# --- GPIO ---
CONFIG_GPIO=y

# --- Other timing ---
CONFIG_TIMESLICING=y

# --- Power Management ---
CONFIG_PM=n
CONFIG_PM_DEVICE=y

# Allow use of WFI/WFE
CONFIG_CORTEX_M_SYSTICK=n
CONFIG_ZERO_LATENCY_IRQS=y

# Keep certain peripherals on (RTC1)
CONFIG_NRFX_RTC1=n
CONFIG_NRFX_CLOCK=n

# Button support
CONFIG_GPIO_GET_CONFIG=y
